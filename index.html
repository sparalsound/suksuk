<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>응숙이의 운명 결정기</title>
    <style>
        body {
            background: #0b0e14;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden;
        }

        h1 {
            font-size: 1.8rem;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            margin-bottom: 30px;
        }

        .slot-machine {
            background: linear-gradient(145deg, #2c3e50, #000);
            width: 80vw;
            max-width: 320px;
            height: 180px;
            border: 8px solid #d4af37;
            border-radius: 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
            overflow: hidden;
        }

        .slot-window {
            font-size: 3.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            transition: 0.1s;
            text-align: center;
        }

        .neon-eat { color: #ff0055; text-shadow: 0 0 20px #ff0055; }
        .neon-stop { color: #00d4ff; text-shadow: 0 0 20px #00d4ff; }

        .controls { margin-top: 50px; }
        #lever-btn {
            background: linear-gradient(to bottom, #d4af37, #b8860b);
            border: none;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 1.2rem;
            color: #000;
            cursor: pointer;
            box-shadow: 0 8px 0 #7b5d09, 0 15px 20px rgba(0,0,0,0.5);
            transition: 0.1s;
            outline: none;
        }

        #lever-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #7b5d09, 0 8px 10px rgba(0,0,0,0.5);
        }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }

        #final-msg {
            margin-top: 30px;
            font-size: 1.1rem;
            height: 3em;
            color: #aaa;
            text-align: center;
            padding: 0 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>✨ 먹보 돼숙이의 운명의 슬롯머신 ✨</h1>

    <div class="slot-machine" id="machine">
        <div class="slot-window" id="slot-text">? ? ?</div>
    </div>

    <div id="final-msg">고민될 땐 하늘에 맡기세요</div>

    <div class="controls">
        <button id="lever-btn">PUSH!</button>
    </div>

    <script>
        const slotText = document.getElementById('slot-text');
        const leverBtn = document.getElementById('lever-btn');
        const machine = document.getElementById('machine');
        const finalMsg = document.getElementById('final-msg');

        // 슬롯 도중 지나가는 문구들
        const options = ["먹어라!", "참아라?", "당장먹어", "고민노노", "딱한입만", "한그릇더"];
        
        // 당첨 시 '먹어라' 전용 멘트들
        const eatMessages = [
            "😋 응숙이 돼지 아니에요~",
            "💖 먹으며 더 예뻐져요!",
            "🔥 맛있게 먹고 배두드리면 배꺼짐~!",
            "✨ 작은공간 배공간 조금 차지해요~",
            "🍗 이건 살 안 쪄요, 내가 먹어봄!"
        ];

        let isSpinning = false;

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            machine.classList.add('shake');
            finalMsg.innerText = "운명의 주사위가 굴러갑니다...";
            leverBtn.disabled = true;

            let count = 0;
            const duration = 30; 
            
            const interval = setInterval(() => {
                const randomText = options[Math.floor(Math.random() * options.length)];
                slotText.innerText = randomText;
                slotText.style.color = count % 2 === 0 ? "#fff" : "#ffd700";
                
                count++;
                if (count > duration) {
                    clearInterval(interval);
                    stopSpin();
                }
            }, 70);
        }

        function stopSpin() {
            machine.classList.remove('shake');
            isSpinning = false;
            leverBtn.disabled = false;

            // 먹어라 확률을 약 90%로 설정 (0.1 이상이면 먹어라)
            const finalDecision = Math.random() > 0.1 ? "먹어라!" : "참아라!";
            slotText.innerText = finalDecision;

            if (finalDecision === "먹어라!") {
                slotText.className = "slot-window neon-eat";
                // 먹어라 멘트 중 랜덤 선택
                finalMsg.innerText = eatMessages[Math.floor(Math.random() * eatMessages.length)];
                if (navigator.vibrate) navigator.vibrate(200);
            } else {
                slotText.className = "slot-window neon-stop";
                finalMsg.innerText = "🧘 먹어라 나올 때까지 돌려보아요~\n(한 번 더 누르면 바뀔지도?)";
                if (navigator.vibrate) navigator.vibrate(50);
            }
        }

        leverBtn.addEventListener('click', spin);
    </script>
</body>
</html>
