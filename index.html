<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>응숙이의 먹거리 돌림판</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px 0;
            font-family: sans-serif;
            color: white;
        }

        /* 캡처될 영역 */
        #capture-area {
            background: radial-gradient(circle, #1a1a1a, #000);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 10px;
            width: 100%;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(to right, #ffd700, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .roulette-container {
            position: relative;
            width: 300px;
            height: 300px;
            border: 5px solid #333;
            border-radius: 50%;
        }

        .pin {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4500;
            z-index: 10;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        #result {
            margin-top: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            min-height: 1.5em;
        }

        /* 버튼 영역 */
        .btn-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            color: white;
        }

        #spin-btn { background: #ff4500; }
        #capture-btn { background: #4facfe; }

        /* 생성된 이미지 결과창 */
        #image-output {
            margin-top: 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            border-top: 1px dashed #555;
            padding-top: 20px;
        }

        #image-output img {
            width: 80%;
            border: 2px solid #ffd700;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="capture-area">
        <h1>✨ 응숙이의 먹거리 돌림판 ✨</h1>
        <div class="roulette-container">
            <div class="pin"></div>
            <canvas id="canvas" width="300" height="300"></canvas>
        </div>
        <div id="result">오늘 뭐 먹지?</div>
    </div>

    <div class="btn-group">
        <button id="spin-btn">돌리기!</button>
        <button id="capture-btn">결과 이미지 만들기</button>
    </div>

    <div id="image-output">
        <p>👇 이미지를 길게 눌러서 저장하세요!</p>
        <div id="img-container"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spin-btn');
        const captureBtn = document.getElementById('capture-btn');
        const resultDiv = document.getElementById('result');
        const outputDiv = document.getElementById('image-output');
        const imgContainer = document.getElementById('img-container');

        const menus = ["영동족발", "작공짜떡", "영동족발", "작공짜떡", "영동족발", "작공짜떡", "영동족발", "작공짜떡", "영동족발", "작공짜떡", "영동족발", "작공짜떡"];
        const colors = ["#8B0000", "#D4AF37", "#1a1a1a", "#B8860B", "#333333", "#A52A2A"];
        let currentRotation = 0;

        function draw() {
            const arc = (Math.PI * 2) / 12;
            menus.forEach((text, i) => {
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 150, i * arc, (i + 1) * arc);
                ctx.fill();
                ctx.save();
                ctx.translate(150, 150);
                ctx.rotate(i * arc + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 14px sans-serif";
                ctx.fillText(text, 140, 5);
                ctx.restore();
            });
        }

        function spin() {
            spinBtn.disabled = true;
            outputDiv.style.display = 'none'; // 새 회전 시 이전 이미지 숨김
            const rotate = Math.floor(Math.random() * 360) + 2160;
            currentRotation += rotate;
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                spinBtn.disabled = false;
                const index = Math.floor((360 - (currentRotation % 360) + 270) % 360 / 30);
                resultDiv.innerHTML = `🎉 당첨: ${menus[index]}! 🎉`;
            }, 4000);
        }

        // 이미지 생성 버튼 로직
        function makeImage() {
            html2canvas(document.getElementById('capture-area'), {
                backgroundColor: "#000"
            }).then(canvas => {
                const img = new Image();
                img.src = canvas.toDataURL("image/png");
                imgContainer.innerHTML = '';
                imgContainer.appendChild(img);
                outputDiv.style.display = 'flex';
                // 화면 아래로 스크롤
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            });
        }

        draw();
        spinBtn.addEventListener('click', spin);
        captureBtn.addEventListener('click', makeImage);
    </script>
</body>
</html>
